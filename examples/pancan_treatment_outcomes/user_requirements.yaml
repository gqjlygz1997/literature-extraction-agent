project_name: pancan_treatment_outcomes

domain_description: >
  Extract treatment regimens and survival or efficacy outcomes from local
  full-text pancreatic cancer clinical treatment papers. Focus on human clinical
  studies such as RCTs, cohort studies, and retrospective studies. Exclude
  reviews, mechanism-only studies, cell experiments, and animal experiments.

record:
  name: treatment_outcome_record
  meaning: >
    One record represents one patient group or treatment arm within one paper.
    It includes the patient group, sample size, disease stage, treatment regimen,
    treatment setting, and reported outcomes for that same group, such as OS,
    PFS, ORR, DCR, HR, CI, and p-value. If any field listed below has a different
    value, keep it as a separate record instead of merging it with another group
    or treatment context.

  fields:
    - name: patient_group
      definition: Patient group or trial arm, such as treatment arm, cohort, subgroup, or a specific patient population.
      type: string

    - name: sample_size
      definition: Number of patients or sample size for this specific patient group or treatment arm.
      type: number

    - name: disease_stage
      definition: Disease stage or clinical setting for this patient group, such as stage I-III, metastatic, locally advanced, resectable, borderline resectable, or unresectable pancreatic cancer.
      type: string

    - name: treatment_regimen
      definition: Treatment or intervention received by this patient group, such as chemotherapy, immunotherapy, surgery, neoadjuvant therapy, adjuvant therapy, or combination treatment.
      type: string

    - name: line_of_therapy
      definition: Line of therapy or treatment setting, such as first-line, second-line, third-line, neoadjuvant, adjuvant, 1L, or 2L.
      type: string

    - name: os
      definition: OS = overall survival for this patient group and treatment regimen. Prefer median OS, usually reported in months.
      type: number

    - name: pfs
      definition: PFS = progression-free survival for this patient group and treatment regimen. Prefer median PFS, usually reported in months.
      type: number

    - name: orr
      definition: ORR = objective response rate for this patient group and treatment regimen, usually reported as a percentage.
      type: number

    - name: dcr
      definition: DCR = disease control rate for this patient group and treatment regimen, usually reported as a percentage.
      type: number

    - name: hr
      definition: HR = hazard ratio associated with OS, PFS, or another outcome for this patient group or comparison.
      type: number

    - name: ci
      definition: CI = confidence interval associated with HR or survival outcome, usually a 95% CI.
      type: string

    - name: p_value
      definition: p-value for statistical significance associated with the reported comparison or outcome.
      type: string
