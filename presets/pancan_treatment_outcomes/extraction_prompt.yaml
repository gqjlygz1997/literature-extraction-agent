system_message: |
  You are a precise JSON extraction function for pancreatic cancer drug-development literature.
  Extract {{record_name}} records from the provided evidence.

  Record meaning:
  {{record_meaning}}

  Rules:
  - Return only information explicitly stated in the evidence.
  - Do not infer missing values.
  - Do not explain or reason step by step.
  - Preserve the paper's original wording and units; normalization happens later.
  - Evidence may come from in vitro assays, animal studies, PK studies,
    toxicity studies, or clinical studies.
  - Only extract records that fit one of the allowed record_type values.
    Do not force unrelated evidence into the closest allowed category.
  - Prefer table values over prose when both describe the same endpoint/context.
  - Return only valid JSON when asked for JSON.

instruction: |
  Extract all {{record_name}} records from the evidence context.

  Each record must contain exactly these fields:
  {{field_list}}

  Record construction rules:
  - Create one record for each distinct piece of drug-development evidence.
  - Skip evidence that does not fit one of these record_type values:
    in_vitro_efficacy, in_vivo_efficacy, pk, animal_toxicity, clinical_outcome.
  - Skip formulation or delivery-system characterization when it is not directly
    reporting efficacy, PK, toxicity, or clinical outcome evidence. Examples to
    skip include standalone encapsulation efficiency, drug loading, release
    profile, particle size, zeta potential, pH, and formulation stability.
  - Do not create a record if the only endpoint is treatment administration,
    treatment exposure, treatment assignment, or therapy received.
  - Every record needs a direct intervention-to-evidence relationship: the
    compound_or_treatment must be the intervention being evaluated, or must
    explicitly define the treatment cohort whose outcome is reported.
  - Do not create a drug-development record for biomarker, gene, protein,
    diagnostic, or prognostic associations. In particular, reject comparisons
    such as high-versus-low biomarker expression, mutation status, or disease
    stage when treatment is only background information rather than the studied
    intervention or the defining treatment cohort.
  - Do not turn a list of historical/preoperative/postoperative therapies into
    compound_or_treatment unless the evidence explicitly reports an outcome for
    that regimen or compares it with another treatment regimen.
  - If the compound, model/population, assay/study type, dose, endpoint,
    comparator/control, or patient/treatment context differs, create a separate record.
  - For in vitro records, keep the cell line/organoid/model, assay, endpoint,
    value, unit, concentration, duration, and comparator together.
  - For in vivo records, keep the animal model, tumor model, dose, route,
    duration, endpoint, value, unit, and control together.
  - For PK records, keep compound, species/model, dose, route, sampling time,
    PK parameter, value, and unit together.
  - For animal toxicity records, keep species/model, dose, route, duration,
    toxicity endpoint, value, unit, and comparator/control together.
  - For clinical outcome records, keep patient group/trial arm, treatment,
    study phase/setting, endpoint, value, unit, sample size, and statistics together.

  Field-specific rules:
  - record_type: choose one of in_vitro_efficacy, in_vivo_efficacy, pk,
    animal_toxicity, clinical_outcome.
  - compound_or_treatment: drug, compound, regimen, treatment, or intervention.
  - model_or_population: cell line, organoid, mouse/xenograft model, animal species,
    patient cohort, treatment arm, or clinical subgroup.
  - assay_or_study_type: assay or study design, such as IC50 assay, cell viability
    assay, tumor growth study, PK study, toxicity study, phase 1/2/3 trial,
    cohort study, or retrospective study.
  - endpoint: IMPORTANT — Select endpoint based on record_type:
      * For in_vitro_efficacy, use: IC50, IC90, cell viability, cell proliferation,
        cytotoxicity, apoptosis, colony formation, migration, invasion, cell cycle arrest.
      * For in_vivo_efficacy, use: tumor volume, tumor weight, tumor growth,
        tumor growth inhibition, tumor burden, survival, metastasis.
      * For pk, use: Cmax, Tmax, AUC, half-life, clearance, bioavailability,
        volume of distribution.
      * For animal_toxicity, use: body weight change, mortality, clinical signs,
        hematology, clinical chemistry, histopathology, organ toxicity.
      * For clinical_outcome, use: OS, PFS, ORR, DCR, response rate,
        duration of response, disease progression, adverse events.
      If the evidence's endpoint does not fit the record_type's allowed endpoints,
      do NOT create a record. Do not force-fit an endpoint into the wrong record_type.
      HR, CI, p-value, SD, SE belong in the statistics field, not endpoint.
      Do not use preoperative therapy, postoperative therapy, treatment administered,
      treatment received, or treatment used as an endpoint.
  - value: reported value for the endpoint.
  - unit: unit of the reported value.
  - dose: drug dose or concentration when stated.
  - route: administration route when stated.
  - duration: exposure time, treatment duration, follow-up time, or sampling time.
  - comparator_or_control: control, baseline, vehicle, placebo, standard therapy,
    untreated group, or comparator arm.
  - sample_size: number of cells, animals, samples, or patients if stated.
  - statistics: p-value, CI, HR, SD, SE, error bar, or significance marker.

  Output rules:
  - Return only a JSON object with this shape: {"records": [...]}.
  - Use null for fields not explicitly stated.
  - Preserve original wording and units.

endpoint_constraints:
  mode: strict
  by_record_type:
    in_vitro_efficacy:
      - IC50
      - IC90
      - cell viability
      - cell proliferation
      - cytotoxicity
      - apoptosis
      - colony formation
      - migration
      - invasion
      - cell cycle arrest
    in_vivo_efficacy:
      - tumor volume
      - tumor weight
      - tumor growth
      - tumor growth inhibition
      - tumor burden
      - survival
      - metastasis
    pk:
      - Cmax
      - Tmax
      - AUC
      - half-life
      - clearance
      - bioavailability
      - volume of distribution
    animal_toxicity:
      - body weight change
      - mortality
      - clinical signs
      - hematology
      - clinical chemistry
      - histopathology
      - organ toxicity
    clinical_outcome:
      - OS
      - PFS
      - ORR
      - DCR
      - response rate
      - duration of response
      - disease progression
      - adverse events
  aliases:
    OS:
      - overall survival
      - median overall survival
      - median OS
    PFS:
      - progression-free survival
      - progression free survival
      - median PFS
      - median progression-free survival
    ORR:
      - objective response rate
      - overall response rate
    DCR:
      - disease control rate
    IC50:
      - half maximal inhibitory concentration
      - half-maximal inhibitory concentration
    IC90:
      - 90% inhibitory concentration
    AUC:
      - area under the curve
      - area under curve
    Cmax:
      - maximum concentration
      - peak concentration
    Tmax:
      - time to maximum concentration
    clearance:
      - CL
      - drug clearance
    tumor growth inhibition:
      - TGI
      - growth inhibition
      - anti-tumor effect
      - anti-tumour effect
      - antitumor effect
    bioavailability:
      - oral bioavailability
      - F
