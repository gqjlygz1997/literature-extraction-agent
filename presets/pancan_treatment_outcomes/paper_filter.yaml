domain_name: pancan_treatment_outcomes
domain_description: >
  Extract pancreatic cancer drug-development evidence from full-text papers.
  The evidence can include in vitro efficacy, in vivo efficacy,
  pharmacokinetics, animal toxicity, clinical outcomes, therapeutic target
  validation, drug-sensitivity evidence, and mechanism studies with clear
  treatment relevance. Include original experimental studies and clinical
  studies related to pancreatic cancer drug development. Exclude reviews,
  editorials, commentaries, papers not related to pancreatic cancer, and papers
  without original evidence relevant to therapy or drug development.
target_fields:
- name: record_type
  description: "Evidence type: in_vitro_efficacy, in_vivo_efficacy, pk, animal_toxicity, or clinical_outcome."
  final_type: string
- name: compound_or_treatment
  description: Drug, compound, regimen, intervention, or treatment being tested.
  final_type: string
- name: model_or_population
  description: Experimental model or clinical population.
  final_type: string
- name: assay_or_study_type
  description: Assay or study type.
  final_type: string
- name: endpoint
  description: Measured endpoint.
  final_type: string
- name: value
  description: Reported endpoint value.
  final_type: string
- name: unit
  description: Unit of the reported value.
  final_type: string
- name: dose
  description: Drug dose or concentration.
  final_type: string
- name: route
  description: Administration route.
  final_type: string
- name: duration
  description: Treatment duration, exposure time, follow-up time, or sampling time.
  final_type: string
- name: comparator_or_control
  description: Comparator, control group, baseline, vehicle, placebo, or standard treatment.
  final_type: string
- name: sample_size
  description: Number of cells, animals, samples, or patients.
  final_type: string
- name: statistics
  description: p-value, confidence interval, hazard ratio, standard deviation, standard error, or significance marker.
  final_type: string
paper_filter:
  input_scope: title_and_abstract
  inclusive_when_uncertain: true
  pass_condition: all_required_not_false
  criteria:
  - name: is_pancreatic_cancer_drug_development_topic
    question: Might this paper be about pancreatic cancer or pancreatic ductal adenocarcinoma drug development, treatment, efficacy, therapeutic targets, drug sensitivity, treatment-relevant mechanisms, pharmacokinetics, toxicity, or clinical outcomes?
    expected_answer: true
    rationale: Keep papers related to pancreatic cancer drug-development evidence, therapeutic target discovery/validation, and treatment-relevant mechanisms, including preclinical and clinical studies. Reject clearly unrelated diseases or topics.
    required: true
  - name: is_original_evidence_study
    question: Might this paper report original experimental or clinical evidence rather than being only a review, editorial, commentary, protocol, guideline, or mechanism-only discussion without original data?
    expected_answer: true
    rationale: The extraction target is structured evidence records from original studies. Keep uncertain cases for high recall.
    required: true
  - name: has_eligible_intervention_evidence
    question: >
      Might the title or abstract report original evidence relevant to pancreatic
      cancer therapy or drug development? Answer true when it evaluates a drug,
      compound, regimen, treatment cohort, drug-sensitivity/resistance phenotype,
      therapeutic target, genetic/biologic perturbation, or treatment-relevant
      mechanism with an outcome in pancreatic cancer models or patients. This
      includes target-discovery and mechanistic papers when the abstract reports
      experimental phenotypes such as tumor growth, proliferation, apoptosis,
      migration, invasion, metastasis, stemness, treatment sensitivity, or survival.
      Answer false only when the study is clearly a pure risk-factor, diagnostic,
      prognostic, epidemiologic, or association-only paper with no evaluated
      intervention, therapeutic target, drug-sensitivity evidence, or actionable
      treatment mechanism. Also answer false when treatment is only a background
      patient characteristic rather than evidence being studied. Answer uncertain
      only when the title/abstract is genuinely insufficient.
    expected_answer: true
    rationale: >
      Paper filtering should favor recall. Full-text extraction and
      post-processing can later decide whether a paper contains structured
      numeric records, but potentially useful therapeutic targets and mechanisms
      should not be discarded from title/abstract alone.
    required: true
    uncertain_policy: pass
  - name: might_report_development_endpoint
    question: Might this paper report an endpoint such as IC50, cell viability, apoptosis, migration, invasion, tumor volume, tumor growth inhibition, PK parameters, toxicity, OS, PFS, ORR, DCR, HR, CI, p-value, or other efficacy/safety/statistical outcome?
    expected_answer: true
    rationale: At least one endpoint or statistic is needed downstream, but title/abstract filtering should remain inclusive.
    required: true
