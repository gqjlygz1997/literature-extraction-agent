version: 1
description: >
  Post-processing preset for pancreatic cancer drug-development evidence records.
  It performs light normalization for record type, common endpoints, routes, and
  generic numeric values while preserving original extraction wording.

null_values:
  - not specified
  - not stated
  - not reported
  - unavailable
  - not applicable

numeric_fields:
  value:
    detect_unit: true
    parse_ranges: true
  dose:
    detect_unit: true
    parse_ranges: true
  duration:
    detect_unit: true
    parse_ranges: true
  sample_size:
    integer: true
    detect_unit: false
    parse_ranges: false
  statistics:
    detect_unit: false
    parse_ranges: true

standardize:
  record_type:
    match: exact
    terms:
      in_vitro_efficacy: [in vitro efficacy, in-vitro efficacy, cell assay, cell-based assay, in_vitro_efficacy]
      in_vivo_efficacy: [in vivo efficacy, in-vivo efficacy, animal efficacy, xenograft efficacy, tumor growth study, in_vivo_efficacy]
      pk: [PK, pharmacokinetics, pharmacokinetic, pharmacokinetic study, pk]
      animal_toxicity: [animal toxicity, toxicity, toxicology, safety study, animal_toxicity]
      clinical_outcome: [clinical outcome, clinical trial outcome, human clinical outcome, phase 1, phase 2, phase 3, clinical_outcome]

  endpoint:
    terms:
      IC50: [IC50, half maximal inhibitory concentration, half-maximal inhibitory concentration]
      cell viability: [cell viability, viability]
      apoptosis: [apoptosis, apoptotic cells]
      migration: [migration, wound healing assay]
      invasion: [invasion, transwell invasion]
      tumor volume: [tumor volume, tumour volume]
      tumor growth inhibition: [tumor growth inhibition, tumour growth inhibition, TGI, growth inhibition]
      Cmax: [Cmax, maximum concentration, peak concentration]
      Tmax: [Tmax, time to maximum concentration]
      AUC: [AUC, area under the curve]
      half-life: [half-life, half life, t1/2, terminal half-life]
      clearance: [clearance, CL]
      toxicity: [toxicity, toxic effect, adverse effect]
      OS: [OS, overall survival, median OS, median overall survival]
      PFS: [PFS, progression-free survival, progression free survival, median PFS]
      ORR: [ORR, objective response rate, overall response rate]
      DCR: [DCR, disease control rate]
      HR: [HR, hazard ratio]
      p-value: [p-value, p value, p-value, P value]

  route:
    match: exact
    terms:
      oral: [oral, orally, PO, p.o.]
      intravenous: [intravenous, IV, i.v.]
      intraperitoneal: [intraperitoneal, IP, i.p.]
      subcutaneous: [subcutaneous, SC, s.c.]
      intratumoral: [intratumoral, intra-tumoral]

validity:
  required_any:
    - endpoint
    - value
    - compound_or_treatment
    - assay_or_study_type
