version: 1
description: >
  Post-processing preset for pancreatic cancer treatment-outcome records.
  It standardizes common clinical outcome units and treatment-setting labels.
  The design mirrors ALLMAT's rule-based normalizer layer: keep extraction
  wording first, then normalize only stable clinical conventions.

null_values:
  - not specified
  - not stated
  - not reported
  - unavailable

numeric_fields:
  sample_size:
    integer: true
    detect_unit: false
    parse_ranges: false
  os:
    unit: month
  pfs:
    unit: month
  orr:
    unit: percent
  dcr:
    unit: percent
  hr:
    unit: ratio
    detect_unit: false
    parse_ranges: false
  ci:
    unit: ratio
    detect_unit: false
    parse_ranges: true
  p_value:
    detect_unit: false
    parse_ranges: false

standardize:
  disease_stage:
    match: exact
    terms:
      stage I-III: [stage I-III, stage I–III, stage I to III, stages I-III, stage 1-3, stage I-III PDAC]
      non-metastatic: [non-metastatic, non metastatic, nonmetastatic]
      resectable: [resectable, resectable PDAC, resectable pancreatic cancer]
      borderline resectable: [borderline resectable, borderline-resectable, BRPC, borderline resectable PDAC]
      locally advanced: [locally advanced, locally-advanced, LAPC, locally advanced pancreatic cancer]
      metastatic: [metastatic, metastatic pancreatic cancer, metastatic PDAC, stage IV, stage 4]
      unresectable: [unresectable, unresectable pancreatic cancer, unresectable PDAC]

  line_of_therapy:
    terms:
      first-line: [first-line, first line, 1L, 1st line, frontline, front-line]
      second-line: [second-line, second line, 2L, 2nd line]
      third-line: [third-line, third line, 3L, 3rd line]
      neoadjuvant: [neoadjuvant, neo-adjuvant, preoperative, pre-operative, pre-surgery, presurgical]
      adjuvant: [adjuvant, postadjuvant, post-operative, postoperative, post-surgery, postsurgical]
      maintenance: [maintenance, maintenance therapy]
      palliative: [palliative, palliative chemotherapy]

  treatment_regimen:
    match: exact
    terms:
      FOLFIRINOX: [FOLFIRINOX, mFOLFIRINOX, modified FOLFIRINOX, modified-FOLFIRINOX]
      gemcitabine: [gemcitabine, GEM, Gem]
      gemcitabine+nab-paclitaxel: [gemcitabine plus nab-paclitaxel, gemcitabine+nab-paclitaxel, nab-paclitaxel plus gemcitabine, nab-paclitaxel/gemcitabine, GnP, AG]
      gemcitabine+erlotinib: [gemcitabine plus erlotinib, gemcitabine+erlotinib]
      gemcitabine+capecitabine: [gemcitabine plus capecitabine, gemcitabine+capecitabine, GemCap]
      gemcitabine+cisplatin: [gemcitabine plus cisplatin, gemcitabine+cisplatin]
      nal-IRI+5-FU/LV: [nal-IRI plus 5-FU/LV, nanoliposomal irinotecan plus fluorouracil and leucovorin, nal-IRI+5-FU/LV]
      surgery: [surgery, surgical resection, radical resection, upfront surgery]
      neoadjuvant therapy: [neoadjuvant therapy, NAT, neoadjuvant chemotherapy, neoadjuvant chemoradiotherapy]
      adjuvant therapy: [adjuvant therapy, adjuvant chemotherapy, ACT]
      chemoradiotherapy: [chemoradiotherapy, chemo-radiotherapy, CRT, concurrent chemoradiotherapy]

validity:
  required_any:
    - os
    - pfs
    - orr
    - dcr
    - hr
    - p_value
    - treatment_regimen
